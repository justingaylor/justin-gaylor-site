# Tag slugs mapped to one-sentence descriptions shown when the tag is selected.
echizo: A fantasy world inspired by Japan during the Sengoku period (1467–1615), where myth and magic shape everyday life.
sketches-of-echizo: Short, standalone vignettes and character studies set in the world of Echizo.
awakening: Awakening is a science fiction universe in which consciousness may be reinstantiated via neural emulators.
fantasy: Fiction set in imagined worlds with magic, mythology, and the supernatural.
short-story: Longer-form fiction, typically between 2,000 and 10,000 words.
flash-fiction: Very short fiction — complete stories told in under 2,000 words.
sci-fi: Stories exploring science, technology, and speculative futures.
meta: Posts about the site itself — how it was built, what changed, and why.
site-news: Announcements and updates about this site.
