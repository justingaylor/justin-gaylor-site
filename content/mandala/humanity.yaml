name: "Humanity"
slug: "humanity"
group: "Foundational"
quote: "It's never too late to do the right thing."
quote_author: "Nicholas Sparks"
description: "Humanity relates to activities for cultivating my character such that I become someone who deserves to finish their first fantasy novel. As I pursue outward goals, I must polish my inner self through actions that improve the quality and strength of my character, and also the welfare of those around me."
core_belief: "My character as a person is inseparable from my work's character. My readers are discerning and can feel whether I am a person worthy of success."
activities:
  - name: "Do what you say you will"
    description: "There is no more important integrity than keeping one's word. If I say I'm going to do something, I will do it. If I cannot do it, I will be honest about that and make amends if necessary."
  - name: "Give honest, generous feedback to aspiring authors"
    description: "Providing constructive feedback to help others grow demonstrates my commitment to the writing community. I will offer my insights honestly and generously, aiming to uplift and guide fellow authors."
  - name: "Be thankful for others' help"
    description: "When someone offers me help, whether it's feedback, support, or resources, I will express my gratitude sincerely. Acknowledging the kindness of others fosters positive relationships and encourages a supportive community."
  - name: "Apologize and rectify mistakes quickly"
    description: "When I make a mistake, I will take responsibility, apologize sincerely, and do what it takes to make amends. Long-term, this builds trust and shows I am a person who values relationships over self-interest."
  - name: "Listen deeply"
    description: "When others speak, I give them my full, unhurried attention. This is a form of respect, but it also opens me up to the worlds of other people and this will be reflected in my writing."
  - name: "Be considerate of others' needs"
    description: "When seeking to connect with others, it is important to first consider their needs and how I can provide value to them. By approaching relationships with a mindset of service and generosity, I can build meaningful connections that are mutually beneficial."
  - name: "Face challenges head-on - no running"
    description: |
      Nothing is more demoralizing than to run away from a problem. The thing about problems is that eventually they catch up to you, no matter how fast you run. When I face a problem, I can solve it and move on. When I run from it, I have to keep looking over my shoulder and my heart never unclenches. Face the problem. Solve it. Move on.

      _Ask not for a lighter burden; ask for broader shoulders._
  - name: "Practice loving-kindness"
    description: |
      All people fundamentally want to be happy and avoid suffering. Loving-kindness is simply the practice of extending goodwill and compassion to all beings, including myself.

      _To my enemies, I wish them happiness. For if they were truly happy, they would have no reason to be my enemy._
