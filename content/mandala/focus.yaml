name: "Focus"
slug: "focus"
group: "Foundational"
quote: "Genius thinks it can do whatever it sees others doing, but is sure to repent of every ill-judged outlay."
quote_author: "Johann Wolfgang von Goethe"
description: "Focus is the disciplined return to what matters when everything wants to pull you away. It does not mean rigidity. Paths shift. Methods change. Timelines bend. But the thing being made - The Project - is seen to completion."
core_belief: "There are infinite projects I could do. I choose one at a time and see each of them to completion. In doing so, my energy becomes a laser instead of a lantern."
activities:
  - name: "Work one project at a time"
    slug: "one-project"
    description: "Multitasking is a myth. When I try to do multiple things at once, I end up doing all of them less well and not finishing any of them. The only way for me to create high-quality work is to immerse myself in the project and see it through to completion."
  - name: "Keep a someday-maybe list"
    slug: "someday-maybe"
    description: "There are many projects I want to do. Unfortunately, I can't do them all at once. To keep my ideas from being lost and keep me from feeling I need to act on them immediately, I will maintain a someday-maybe list. This is a place to capture all of the projects I want to do in the future. I can return to them when I'm ready to start something new."
  - name: "Create a distraction-free workspace"
    slug: "distraction-free"
    description: "Environment has a huge impact on focus. To support my ability to focus, I will create a distraction-free writing space."
  - name: "Prevent fatigue with the Pomodoro method"
    slug: "pomodoro"
    description: "Specifically for longer work sessions, I will use the Pomodoro method to prevent fatigue and maintain focus. My exact flavor of this method is to write or edit 45 minutes, then get up and rest for 15 minutes. After four cycles, I will take a longer break of 1 hour."
  - name: "Define 'done' for each project"
    slug: "define-done"
    description: "To ensure that I see each project through to completion, I will define what 'done' looks like for each project. This will help me stay focused on the end goal and avoid getting lost in the weeds. This definition can be changed later, particularly if I decide to abandon a project; I should still define what 'done' means in that context and achieve it."
  - name: "Practice concentration meditation"
    slug: "concentration"
    description: "Concentration meditation is form of meditation with the goal of focusing the mind on a single objection of attention - one's breath, a flame, a mantra, etc - and return to the object of attention whenever the mind wanders. This form of meditation is a workout for the focus muscle. By practicing it regularly, I can strengthen my ability to focus and return to what matters when distractions arise."
  - name: "Use environmental cues for focus"
    slug: "env-cues"
    description: "Environmental cues can help signal to my brain that it's time to focus. This includes always writing in a specific location, lighting, specific music, or even scents that I associate with focused work. By consistently using these cues, I can train my mind to enter a state of focus more quickly."
  - name: "Avoid energy drains"
    slug: "avoid-drains"
    description: "Certain activities and environments drain my energy and make it harder for me to focus. I will identify these energy drains and do my best to avoid them, particularly when I'm working on a project. This includes certain social interactions, news consumption, and unstructured time on the Internet."
